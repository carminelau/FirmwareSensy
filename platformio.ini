[platformio]
core_dir = .platformio
default_envs =
    sensy_2021_V4_white
    sensy_2023_V1_green
    sensy_2023_V2_black
    sensy_2024_V1_green
    sensy_2024_V2_ENEA
    sensy_2024_V3_red
    sensy_2024_V4_green
    sensy_2024_V4_black

[env]
monitor_speed = 115200

[common]
platform = espressif32@6.12.0
framework = arduino
lib_deps =
    adafruit/RTClib@2.1.4
    https://github.com/carminelau/PMserial.git#d347a0764166974a1a84ed96d9e70a9da2dba3df
    https://github.com/carminelau/SHT21.git#4a0a842
    https://github.com/Sense-Square/SPIlib.git#c59a94926dd0ce9e38663b69685991d782ddef7d
    https://github.com/DFRobot/DFRobot_OzoneSensor.git#bf073b730981c0e4fc4a6e859173cee4edd8c1fe
    https://github.com/Seeed-Studio/Seeed_Arduino_MultiGas.git#864730f97cfa57e170580f3148c8ea3fff1f3ee8
    https://github.com/DFRobot/DFRobot_MultiGasSensor.git#5b08794160db81db76a7cb5348a8f17784e70cf1
    https://github.com/bblanchon/ArduinoJson.git#aa7fbd6c8be280121cf57044ef986da7353ffd67
    https://github.com/256dpi/arduino-mqtt.git#849b7a5b3dc6cfca189a03990160f1c1d4bdae0b
    https://github.com/arduino-libraries/ArduinoHttpClient.git#83514bf54d6bfdac5662085c098b79f447ffd5ad
    https://github.com/me-no-dev/ESPAsyncWebServer.git#ad3741d159f9cfd50c567e81b67f3bef1dc6d89f
    https://github.com/sparkfun/SparkFun_u-blox_GNSS_Arduino_Library.git#edbe2ed59290385bae235a77ceb2f75a6e73e0f0
    https://github.com/Sensirion/arduino-sps.git#2b3cadae1b574cf105a651822e6668424b8e1b3b
    https://github.com/Sensirion/arduino-i2c-sen5x.git#d86ed2f1511e38820a71ec8a531ceae57f75174a
    https://github.com/Sensirion/arduino-i2c-scd30.git#07e0958b3f517188e0d843e437cf6323c5a5225a
    sensirion/Sensirion I2C SCD4x@1.1.0
    https://github.com/DFRobot/DFRobot_MICS.git#5f3177aeb8e824ad43151b60d4efd7e74057d04d
    https://github.com/claws/BH1750.git#b6986b553faed246ee267801ca23ccaea038d7cc
    https://github.com/carminelau/modbus-sensor-library.git#58ebe08389cb10f09611c339020928ae8ce2511c

[env:sensy_2021_V4_white]
platform = ${common.platform}
framework = ${common.framework}
board = esp32dev
board_build.flash_mode = dio
board_upload.flash_size = 4MB
board_upload.maximum_size = 1310720
board_build.partitions = default.csv
lib_deps = ${common.lib_deps}
build_flags =
    -DBOARD_NAME=\"${this.__env__}\"
    -DOTA_BOARD=\"2021V4_WH\"
    -DYEAR=2021
    -DVERSION=4
    -DARDUINO_ESP32_DEV
    -DMOSI_PIN=13
    -DMISO_PIN=12
    -DSCK_PIN=14
    -DCS_PIN=15
    -DSDA_PIN=21
    -DSCL_PIN=22
    -DTX_PMS_PIN=5
    -DRX_PMS_PIN=4
    -DDI_PIN=26
    -DRO_PIN=32
    -DRE_PIN=33
    -DDE_PIN=25
    -DLED_VOLTAGE=-1
    -DLED_TYPE=-1
    -DRELAY=1
    -DPMS_SET_PIN=27
    -DRELAY1_PIN=18
    -DRELAY2_PIN=19

