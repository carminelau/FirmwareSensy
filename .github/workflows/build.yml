name: firmware-build

on:
  push:
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "platformio==6.1.18"
      - run: pio test -e native

  build-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "platformio==6.1.18"
      - run: python scripts/build_matrix.py --check
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firmware-size-report
          path: .pio/size-report.json
          if-no-files-found: ignore

  debug-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - sensy_2021_V4_white
          - sensy_2023_V1_green
          - sensy_2023_V2_black
          - sensy_2024_V1_green
          - sensy_2024_V2_ENEA
          - sensy_2024_V3_red
          - sensy_2024_V4_green
          - sensy_2024_V4_black
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "platformio==6.1.18"
      - run: pio run -e "${{ matrix.environment }}"
        env:
          PLATFORMIO_BUILD_FLAGS: "-DFW_LOG_LEVEL=3 -DFW_LOG_BILINGUAL=1"

  project-warnings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "platformio==6.1.18"
      - name: Reject project warnings
        shell: bash
        run: |
          set -o pipefail
          pio run -e sensy_2021_V4_white 2>&1 | tee build.log
          ! grep -E '^src[/\\].*warning:' build.log
        env:
          PLATFORMIO_BUILD_FLAGS: "-Wall -Wextra -Wshadow -Wduplicated-cond -Wlogical-op"
